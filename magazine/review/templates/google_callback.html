<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continue to Google Photos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,600&family=Instrument+Sans:wght@400;500;600&display=swap');
        :root {
            --paper: #f1ece5;
            --ink: #14110f;
            --muted: #70665f;
            --line: rgba(20, 17, 15, 0.14);
            --surface: rgba(255, 251, 246, 0.96);
            --accent: #14110f;
            --white: #fffaf4;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--ink);
            font-family: "Instrument Sans", "Helvetica Neue", sans-serif;
            background: linear-gradient(180deg, #121212 0 132px, var(--paper) 132px 100%);
        }
        .card {
            width: min(620px, 100%);
            padding: 28px;
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.12);
        }
        .eyebrow {
            margin: 0 0 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        h1 {
            margin: 0;
            font-family: "Bodoni Moda", "Times New Roman", serif;
            font-size: clamp(38px, 8vw, 58px);
            line-height: 0.92;
            letter-spacing: -0.04em;
        }
        p {
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            margin-top: 24px;
            padding: 0 18px;
            background: var(--accent);
            color: var(--white);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">Maison Folio</p>
        <h1>Continuing to Google Photos…</h1>
        <p>This same window is moving directly into the Google Photos picker.</p>
        <p>If the redirect does not continue automatically, use the button below.</p>
        <a class="btn" href="{{ picker_uri }}">Continue</a>
    </main>

    <script>
        try {
            if (window.opener) {
                window.opener.postMessage({
                    type: 'magazine-google-picker-ready',
                    state: {{ google_state|tojson }},
                    token: {{ google_token|tojson }},
                    sessionId: {{ google_session_id|tojson }}
                }, window.location.origin);
            }
        } catch (err) {
            // Ignore opener messaging failures and continue to the picker.
        }
        window.location.replace({{ picker_uri|tojson }});
    </script>
</body>
</html>
