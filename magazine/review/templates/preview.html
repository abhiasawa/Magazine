{% extends "base.html" %}

{% block content %}
<section class="preview-shell">
    <div class="preview-header">
        <span class="preview-kicker">Maison Folio</span>
        <h1 class="preview-title">Your volume is ready.</h1>
    </div>

    <div class="preview-grid">
        <!-- PDF Column -->
        <div class="preview-card">
            <div class="card-label">
                <span class="card-dot card-dot-pdf"></span>
                <span>Print-Ready PDF</span>
            </div>
            <div class="preview-frame">
                <iframe
                    id="preview-embed"
                    class="preview-embed"
                    title="Maison Folio PDF preview"
                ></iframe>
                <div class="preview-overlay" id="pdf-overlay">
                    <span class="overlay-text" id="pdf-status-text">Loading preview&hellip;</span>
                </div>
            </div>
            <div class="card-actions">
                <button type="button" class="btn btn-primary" id="download-pdf" disabled>Download PDF</button>
            </div>
        </div>

        <!-- Video Column -->
        <div class="preview-card">
            <div class="card-label">
                <span class="card-dot card-dot-video"></span>
                <span>Social Video Reel</span>
                <span class="card-badge" id="video-badge">Rendering</span>
            </div>
            <div class="video-frame" id="video-frame">
                <video id="video-preview" controls playsinline>
                    <source src="{{ url_for('preview_video') }}" type="video/mp4">
                </video>
                <div class="preview-overlay" id="video-overlay">
                    <div class="spinner" id="video-spinner"></div>
                    <div class="video-progress-wrap" id="video-progress-wrap">
                        <div class="video-progress-track">
                            <div class="video-progress-fill" id="video-progress-fill"></div>
                        </div>
                        <div class="video-progress-meta">
                            <span class="video-progress-pct" id="video-progress-pct">0%</span>
                            <span class="video-progress-eta" id="video-progress-eta"></span>
                        </div>
                    </div>
                    <span class="overlay-text" id="video-status-text">Rendering video&hellip;</span>
                </div>
            </div>
            <div class="card-actions">
                <a class="btn btn-primary" id="download-video" href="{{ url_for('download_video') }}" disabled>Download Video</a>
            </div>
        </div>
    </div>

    <div class="preview-footer">
        <a class="btn btn-ghost" href="{{ url_for('import_screen') }}">Create another volume</a>
    </div>
</section>

<style>
    .preview-shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
    }
    .preview-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }
    .preview-kicker {
        display: block;
        font-family: var(--font-sans, sans-serif);
        font-size: .7rem;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: var(--color-muted, #8b8478);
        margin-bottom: .5rem;
    }
    .preview-title {
        font-family: var(--font-display, serif);
        font-size: 2rem;
        font-weight: 400;
        color: var(--color-text, #f4f1ea);
        letter-spacing: .02em;
    }

    /* Grid — stacked layout so both PDF and video get full prominence */
    .preview-grid {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    /* Cards */
    .preview-card {
        background: rgba(255,255,255,.03);
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 12px;
        padding: 1.25rem;
    }
    .card-label {
        display: flex;
        align-items: center;
        gap: .5rem;
        font-family: var(--font-sans, sans-serif);
        font-size: .75rem;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: var(--color-muted, #8b8478);
        margin-bottom: 1rem;
    }
    .card-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    .card-dot-pdf { background: #c7aa73; }
    .card-dot-video { background: #9ba8b8; }
    .card-badge {
        margin-left: auto;
        font-size: .65rem;
        padding: .2rem .6rem;
        border-radius: 100px;
        background: rgba(155,168,184,.15);
        color: #9ba8b8;
        letter-spacing: .06em;
    }
    .card-badge.ready { background: rgba(120,180,120,.15); color: #8bc78b; }
    .card-badge.failed { background: rgba(180,120,120,.15); color: #c78b8b; }
    .card-actions {
        margin-top: 1rem;
        display: flex;
        justify-content: center;
        gap: .75rem;
    }
    .card-actions .btn {
        min-width: 180px;
        text-align: center;
        text-decoration: none;
    }
    .card-actions .btn[disabled] {
        opacity: .4;
        pointer-events: none;
    }

    /* PDF Preview */
    .preview-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 297/210;
        background: #111;
        border-radius: 6px;
        overflow: hidden;
    }
    .preview-embed {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* Video Preview */
    .video-frame {
        position: relative;
        width: 100%;
        max-width: 360px;
        margin: 0 auto;
        aspect-ratio: 9/16;
        background: #0a0a0a;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    .video-frame video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
    }

    /* Overlays */
    .preview-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(10,10,10,.85);
        transition: opacity .4s ease;
    }
    .preview-overlay.hidden {
        opacity: 0;
        pointer-events: none;
    }
    .overlay-text {
        font-family: var(--font-sans, sans-serif);
        font-size: .78rem;
        color: var(--color-muted, #8b8478);
        letter-spacing: .04em;
    }

    /* Spinner */
    .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(155,168,184,.2);
        border-top-color: #9ba8b8;
        border-radius: 50%;
        animation: spin .8s linear infinite;
        margin-bottom: .75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Video progress bar */
    .video-progress-wrap {
        width: 80%;
        max-width: 200px;
        margin-bottom: .75rem;
    }
    .video-progress-track {
        width: 100%;
        height: 4px;
        background: rgba(155,168,184,.15);
        border-radius: 2px;
        overflow: hidden;
    }
    .video-progress-fill {
        height: 100%;
        width: 0%;
        background: #9ba8b8;
        border-radius: 2px;
        transition: width .6s ease;
    }
    .video-progress-meta {
        display: flex;
        justify-content: space-between;
        margin-top: .35rem;
        font-family: var(--font-sans, sans-serif);
        font-size: .65rem;
        color: var(--color-muted, #8b8478);
        letter-spacing: .03em;
    }

    /* Footer */
    .preview-footer {
        text-align: center;
        margin-top: 2.5rem;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    const PDF_STORE = 'maison-folio-preview';
    const PDF_KEY = 'latest';
    const previewEmbed = document.getElementById('preview-embed');
    const pdfOverlay = document.getElementById('pdf-overlay');
    const pdfStatusText = document.getElementById('pdf-status-text');
    const downloadPdf = document.getElementById('download-pdf');
    const videoPreview = document.getElementById('video-preview');
    const videoOverlay = document.getElementById('video-overlay');
    const videoStatusText = document.getElementById('video-status-text');
    const videoBadge = document.getElementById('video-badge');
    const downloadVideo = document.getElementById('download-video');
    let previewUrl = null;

    function openPreviewDb() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(PDF_STORE, 1);
            req.onupgradeneeded = () => req.result.createObjectStore('pdfs');
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function readPreviewBlob() {
        const db = await openPreviewDb();
        const payload = await new Promise((resolve, reject) => {
            const tx = db.transaction('pdfs', 'readonly');
            const req = tx.objectStore('pdfs').get(PDF_KEY);
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => reject(req.error);
        });
        db.close();
        return payload;
    }

    async function mountPdfPreview() {
        try {
            const payload = await readPreviewBlob();
            if (!payload?.blob) {
                pdfStatusText.textContent = 'No preview available. Generate a magazine first.';
                return;
            }

            previewUrl = URL.createObjectURL(payload.blob);
            previewEmbed.src = `${previewUrl}#view=FitH`;
            pdfOverlay.classList.add('hidden');
            downloadPdf.disabled = false;

            downloadPdf.addEventListener('click', () => {
                const a = document.createElement('a');
                a.href = previewUrl;
                a.download = payload.filename || 'Maison-Folio.pdf';
                document.body.appendChild(a);
                a.click();
                a.remove();
            });
        } catch (err) {
            pdfStatusText.textContent = 'Could not load preview. Generate the magazine again.';
        }
    }

    // Video status polling
    const videoProgressFill = document.getElementById('video-progress-fill');
    const videoProgressPct = document.getElementById('video-progress-pct');
    const videoProgressEta = document.getElementById('video-progress-eta');

    function formatEta(seconds) {
        if (seconds <= 0) return '';
        if (seconds < 60) return `~${seconds}s left`;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `~${m}m ${s}s left`;
    }

    async function checkVideoStatus() {
        try {
            const res = await fetch('/api/video/status');
            const data = await res.json();

            if (data.status === 'ready') {
                videoProgressFill.style.width = '100%';
                videoProgressPct.textContent = '100%';
                videoProgressEta.textContent = '';
                videoStatusText.textContent = 'Video ready';
                setTimeout(() => {
                    videoOverlay.classList.add('hidden');
                    videoPreview.style.display = 'block';
                    videoPreview.load();
                }, 400);
                videoBadge.textContent = 'Ready';
                videoBadge.className = 'card-badge ready';
                downloadVideo.removeAttribute('disabled');
                return true;
            } else if (data.status === 'failed') {
                videoStatusText.textContent = data.error ? 'Video unavailable' : 'Video unavailable';
                document.getElementById('video-spinner').style.display = 'none';
                document.getElementById('video-progress-wrap').style.display = 'none';
                videoBadge.textContent = 'Unavailable';
                videoBadge.className = 'card-badge failed';
                return true;
            } else if (data.status === 'rendering') {
                const pct = data.progress || 0;
                videoProgressFill.style.width = pct + '%';
                videoProgressPct.textContent = pct + '%';
                videoProgressEta.textContent = formatEta(data.remaining || 0);
                videoBadge.textContent = pct + '%';
            }
            return false; // still rendering
        } catch {
            return false;
        }
    }

    async function pollVideoStatus() {
        const done = await checkVideoStatus();
        if (!done) {
            setTimeout(pollVideoStatus, 2000);
        }
    }

    window.addEventListener('beforeunload', () => {
        if (previewUrl) URL.revokeObjectURL(previewUrl);
    });

    mountPdfPreview();
    pollVideoStatus();
</script>
{% endblock %}
