{% extends "base.html" %}

{% block content %}
<section class="preview-shell">
    <div class="preview-header">
        <span class="preview-kicker">Maison Folio</span>
        <h1 class="preview-title">Your volume is ready.</h1>
    </div>

    <div class="preview-grid">
        <!-- PDF Column -->
        <div class="preview-card">
            <div class="card-label">
                <span class="card-dot card-dot-pdf"></span>
                <span>Print-Ready PDF</span>
            </div>
            <div class="preview-frame">
                <iframe
                    id="preview-embed"
                    class="preview-embed"
                    title="Maison Folio PDF preview"
                ></iframe>
                <div class="preview-overlay" id="pdf-overlay">
                    <span class="overlay-text" id="pdf-status-text">Loading preview&hellip;</span>
                </div>
            </div>
            <div class="card-actions">
                <button type="button" class="btn btn-primary" id="download-pdf" disabled>Download PDF</button>
            </div>
        </div>
    </div>

    <div class="preview-footer">
        <a class="btn btn-ghost" href="{{ url_for('import_screen') }}">Create another volume</a>
    </div>
</section>

<style>
    .preview-shell {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
    }
    .preview-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }
    .preview-kicker {
        display: block;
        font-family: var(--font-sans, sans-serif);
        font-size: .7rem;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: var(--color-muted, #8b8478);
        margin-bottom: .5rem;
    }
    .preview-title {
        font-family: var(--font-display, serif);
        font-size: 2rem;
        font-weight: 400;
        color: var(--color-text, #f4f1ea);
        letter-spacing: .02em;
    }

    .preview-grid {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    /* Cards */
    .preview-card {
        background: rgba(255,255,255,.03);
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 12px;
        padding: 1.25rem;
    }
    .card-label {
        display: flex;
        align-items: center;
        gap: .5rem;
        font-family: var(--font-sans, sans-serif);
        font-size: .75rem;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: var(--color-muted, #8b8478);
        margin-bottom: 1rem;
    }
    .card-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    .card-dot-pdf { background: #c7aa73; }
    .card-actions {
        margin-top: 1rem;
        display: flex;
        justify-content: center;
        gap: .75rem;
    }
    .card-actions .btn {
        min-width: 180px;
        text-align: center;
        text-decoration: none;
    }
    .card-actions .btn[disabled] {
        opacity: .4;
        pointer-events: none;
    }

    /* PDF Preview */
    .preview-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 297/210;
        background: #111;
        border-radius: 6px;
        overflow: hidden;
    }
    .preview-embed {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* Overlays */
    .preview-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(10,10,10,.85);
        transition: opacity .4s ease;
    }
    .preview-overlay.hidden {
        opacity: 0;
        pointer-events: none;
    }
    .overlay-text {
        font-family: var(--font-sans, sans-serif);
        font-size: .78rem;
        color: var(--color-muted, #8b8478);
        letter-spacing: .04em;
    }

    /* Footer */
    .preview-footer {
        text-align: center;
        margin-top: 2.5rem;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    const PDF_STORE = 'maison-folio-preview';
    const PDF_KEY = 'latest';
    const previewEmbed = document.getElementById('preview-embed');
    const pdfOverlay = document.getElementById('pdf-overlay');
    const pdfStatusText = document.getElementById('pdf-status-text');
    const downloadPdf = document.getElementById('download-pdf');
    let previewUrl = null;

    function openPreviewDb() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(PDF_STORE, 1);
            req.onupgradeneeded = () => req.result.createObjectStore('pdfs');
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function readPreviewBlob() {
        const db = await openPreviewDb();
        const payload = await new Promise((resolve, reject) => {
            const tx = db.transaction('pdfs', 'readonly');
            const req = tx.objectStore('pdfs').get(PDF_KEY);
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => reject(req.error);
        });
        db.close();
        return payload;
    }

    async function mountPdfPreview() {
        try {
            const payload = await readPreviewBlob();
            if (!payload?.blob) {
                pdfStatusText.textContent = 'No preview available. Generate a magazine first.';
                return;
            }

            previewUrl = URL.createObjectURL(payload.blob);
            previewEmbed.src = `${previewUrl}#view=FitH`;
            pdfOverlay.classList.add('hidden');
            downloadPdf.disabled = false;

            downloadPdf.addEventListener('click', () => {
                const a = document.createElement('a');
                a.href = previewUrl;
                a.download = payload.filename || 'Maison-Folio.pdf';
                document.body.appendChild(a);
                a.click();
                a.remove();
            });
        } catch (err) {
            pdfStatusText.textContent = 'Could not load preview. Generate the magazine again.';
        }
    }

    window.addEventListener('beforeunload', () => {
        if (previewUrl) URL.revokeObjectURL(previewUrl);
    });

    mountPdfPreview();
</script>
{% endblock %}
