<div class="page page-three-photo">
    {% if page.photos|length >= 1 %}
    <div class="photo-large">
        <img src="{{ page.photos[0].print_path }}">
    </div>
    {% endif %}
    {% if page.photos|length >= 2 %}
    <div class="photos-bottom">
        {% for photo in page.photos[1:3] %}
        <div class="photo-small">
            <img src="{{ photo.print_path }}">
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
