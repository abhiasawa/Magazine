<div class="page page-back-cover">
    <div class="back-content">
        {% if page.photos %}
        <img class="back-photo" src="{{ page.photos[0].print_path }}">
        {% endif %}
        <div class="back-rule"></div>
        <h2 class="back-title">{{ page.title }}</h2>
        <p class="back-message">Forever &amp; Always</p>
        <div class="back-accent"></div>
    </div>
</div>
